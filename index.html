<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>iPhone Elite — Tecnología de Lujo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #D4AF37;
      --gold-light: #E8CC6A;
      --gold-dark: #A8892A;
      --black: #000000;
      --white: #FFFFFF;
      --gray: #8E8E93;
      --gray-light: #F5F5F7;
      --gray-border: #E5E5EA;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--black); overflow-x: hidden; padding-bottom: 0; }

    /* ── NAVBAR TOP ACTUALIZADA ── */
    .top-nav {
      position: sticky; top: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 70px;
      background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--gray-border);
    }
    .logo-wrap { display: flex; align-items: center; gap: 10px; text-decoration: none; cursor: pointer; }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--black); }
    .logo-text span { color: var(--gold); }

    .nav-right-actions { display: flex; align-items: center; gap: 20px; }
    .nav-action-item { 
      cursor: pointer; display: flex; align-items: center; gap: 6px; 
      font-weight: 600; font-size: 14px; color: var(--black); transition: 0.3s;
    }
    .nav-action-item:hover { color: var(--gold); }

    .cart-btn-wrap { position: relative; }
    .cart-badge {
      position: absolute; top: -8px; right: -8px;
      background: var(--gold); color: white; font-size: 10px;
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── HERO CON ANIMACION.JPG ── */
    .hero {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 80vh; padding: 60px 24px; text-align: center;
      background: linear-gradient(160deg, #FAFAFA 0%, #FFFFFF 100%);
    }
    .hero-main-img { 
      width: 100%; max-width: 450px; border-radius: 30px; 
      box-shadow: 0 32px 64px rgba(0,0,0,0.15); margin-bottom: 30px;
      animation: fadeDown 0.8s ease;
    }
    .hero-title { font-family: 'Playfair Display', serif; font-size: 40px; font-weight: 700; margin-bottom: 15px; }

    /* ── TIENDA Y PRODUCTOS ── */
    .section-header { padding: 48px 24px 24px; display: flex; align-items: flex-end; justify-content: space-between; }
    .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 16px 24px; }
    @media (min-width: 900px) { .products-grid { grid-template-columns: repeat(4, 1fr); } }

    .product-card { background: var(--white); border-radius: 20px; border: 1px solid var(--gray-border); overflow: hidden; transition: all 0.3s ease; cursor: pointer; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.1); border-color: var(--gold); }
    .product-img-wrap { background: var(--gray-light); height: 160px; display: flex; align-items: center; justify-content: center; position: relative; }

    /* ── CARRITO SIDEBAR ── */
    #cart-sidebar {
      position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%;
      background: white; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -10px 0 40px rgba(0,0,0,0.2); padding: 30px; display: flex; flex-direction: column;
    }
    #cart-sidebar.open { right: 0; }
    .cart-items-container { flex: 1; overflow-y: auto; margin: 20px 0; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--gray-light); }

    /* ── MODAL ── */
    .modal { display: none; position: fixed; inset: 0; z-index: 1500; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: white; width: 100%; max-width: 500px; border-radius: 24px; padding: 30px; position: relative; max-height: 90vh; overflow-y: auto; }
    .close-modal { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; color: var(--gray); }
    .modal-btns-group { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }
    .btn-main { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn-cart { background: var(--black); color: white; }
    .btn-buy { background: var(--gold); color: white; }

    /* ── SEARCH OVERLAY ── */
    #search-overlay { display: none; position: fixed; inset: 0; background: white; z-index: 3000; padding: 40px 20px; }
    #search-overlay.open { display: block; }
    .search-input-field { width: 100%; padding: 16px; border: 1.5px solid var(--gray-border); border-radius: 14px; font-size: 18px; outline: none; transition: 0.3s; }
    .search-input-field:focus { border-color: var(--gold); }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    .reveal { opacity: 0; transform: translateY(20px); transition: 0.6s all ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>

<body>

  <nav class="top-nav">
    <a class="logo-wrap" onclick="scrollToTop()">
      <span class="logo-text">iPhone <span>Elite</span></span>
    </a>
    <div class="nav-right-actions">
      <div class="nav-action-item" onclick="openSearch()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Buscar</span>
      </div>
      <a href="#iphones" class="nav-action-item">Tienda</a>
      <div class="nav-action-item cart-btn-wrap" onclick="toggleCart()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-badge" id="cart-count">0</span>
      </div>
    </div>
  </nav>

  <section class="hero" id="inicio">
    <img src="animacion.jpg" alt="iPhone Elite Exclusive" class="hero-main-img">
    <h1 class="hero-title">iPhone Elite Chile</h1>
    <p style="color: var(--gray); font-size: 18px; max-width: 400px; line-height: 1.6;">Equipos originales con garantía, al mejor precio del mercado.</p>
  </section>

  <section id="iphones">
    <div class="section-header reveal">
      <h2 class="logo-text">Modelos <span>Disponibles</span></h2>
    </div>
    <div class="products-grid" id="main-product-grid">
      </div>
  </section>

  <div id="product-modal" class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <span class="close-modal" onclick="closeModal()">&times;</span>
      <h2 id="modal-title" class="logo-text"></h2>
      <p id="modal-price" style="font-size: 24px; font-weight: 700; color: var(--gold); margin: 15px 0;"></p>
      <p id="modal-desc" style="color: var(--gray); line-height: 1.6; margin-bottom: 20px;"></p>
      <div class="modal-btns-group">
        <button class="btn-main btn-cart" onclick="addToCart()">Agregar al Carrito</button>
        <button class="btn-main btn-buy" onclick="buyNow()">Comprar Ahora (WhatsApp)</button>
      </div>
    </div>
  </div>

  <div id="cart-sidebar">
    <span class="close-modal" onclick="toggleCart()">&times;</span>
    <h2 class="logo-text" style="margin-bottom: 20px;">Tu Carrito</h2>
    <div class="cart-items-container" id="cart-list">
      </div>
    <div id="cart-total" style="font-size: 20px; font-weight: 700; margin-bottom: 20px; border-top: 1px solid #eee; padding-top: 20px;"></div>
    <button class="btn-main btn-buy" onclick="checkoutWhatsApp()">Finalizar Compra por WhatsApp</button>
  </div>

  <div id="search-overlay">
    <span class="close-modal" onclick="closeSearch()">&times;</span>
    <input type="text" class="search-input-field" id="search-input" placeholder="Escribe el modelo que buscas...">
    <div class="products-grid" id="search-results" style="margin-top: 30px;"></div>
  </div>

  <script>
    // BASE DE DATOS DE TUS PRODUCTOS (He incluido tus principales modelos)
    const stock = [
      { id: 1, name: 'iPhone 11', price: '$169.990', rawPrice: 169990, desc: '64GB · Rojo. Batería 100%. Impecable.' },
      { id: 2, name: 'iPhone 12 Pro Max', price: '$379.990', rawPrice: 379990, desc: '128GB · Gris. Pantalla Super Retina XDR.' },
      { id: 3, name: 'iPhone 15 Pro Max', price: '$769.990', rawPrice: 769990, desc: '256GB · Azul Titanio. Chip A17 Pro.' },
      { id: 4, name: 'Samsung S24 Ultra', price: '$589.990', rawPrice: 589990, desc: '256GB · Negro. Inteligencia Artificial integrada.' },
      { id: 5, name: 'iPhone 16 Pro Max', price: '$879.990', rawPrice: 879990, desc: '128GB · Blanco. El modelo más avanzado hasta la fecha.' }
    ];

    let cart = [];
    let selectedProduct = null;

    // RENDERIZAR TIENDA
    function renderGrid(containerId, data) {
      const container = document.getElementById(containerId);
      container.innerHTML = data.map(p => `
        <div class="product-card reveal" onclick="openModal(${p.id})">
          <div class="product-img-wrap">📱</div>
          <div style="padding: 15px;">
            <div style="font-weight: 600; font-size: 14px;">${p.name}</div>
            <div style="color: var(--gold); font-weight: 700; margin-top: 5px;">${p.price}</div>
          </div>
        </div>
      `).join('');
      observeScroll();
    }

    // MODAL LÓGICA
    function openModal(id) {
      selectedProduct = stock.find(p => p.id === id);
      document.getElementById('modal-title').innerText = selectedProduct.name;
      document.getElementById('modal-price').innerText = selectedProduct.price;
      document.getElementById('modal-desc').innerText = selectedProduct.desc;
      document.getElementById('product-modal').style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('product-modal').style.display = 'none';
      document.body.style.overflow = 'auto';
    }

    // CARRITO LÓGICA
    function addToCart() {
      cart.push(selectedProduct);
      updateCartUI();
      closeModal();
      toggleCart();
    }

    function toggleCart() {
      document.getElementById('cart-sidebar').classList.toggle('open');
    }

    function updateCartUI() {
      document.getElementById('cart-count').innerText = cart.length;
      const list = document.getElementById('cart-list');
      let total = 0;
      list.innerHTML = cart.map(p => {
        total += p.rawPrice;
        return `<div class="cart-item"><span>${p.name}</span><strong>${p.price}</strong></div>`;
      }).join('');
      document.getElementById('cart-total').innerText = `Total: $${total.toLocaleString('es-CL')}`;
    }

    // WHATSAPP LÓGICA
    function buyNow() {
      const msg = encodeURIComponent(`Hola iPhone Elite! Me interesa comprar el ${selectedProduct.name} por ${selectedProduct.price}.`);
      window.open(`https://wa.me/56964271938?text=${msg}`);
    }

    function checkoutWhatsApp() {
      if (cart.length === 0) return;
      let text = "Hola iPhone Elite! Quiero comprar:\n\n";
      cart.forEach(p => text += `- ${p.name} (${p.price})\n`);
      const total = cart.reduce((acc, p) => acc + p.rawPrice, 0);
      text += `\n*Total: $${total.toLocaleString('es-CL')}*`;
      window.open(`https://wa.me/56964271938?text=${encodeURIComponent(text)}`);
    }

    // BUSCADOR LÓGICA
    function openSearch() { document.getElementById('search-overlay').classList.add('open'); }
    function closeSearch() { document.getElementById('search-overlay').classList.remove('open'); }

    document.getElementById('search-input').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      const filtered = stock.filter(p => p.name.toLowerCase().includes(q));
      renderGrid('search-results', filtered);
    });

    // EFECTOS VISUALES
    function observeScroll() {
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
      });
      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }

    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

    // INICIO
    renderGrid('main-product-grid', stock);
  </script>

</body>
</html>
